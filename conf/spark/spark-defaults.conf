# Spark + Iceberg, общий каталog через Hive Metastore, данные в MinIO (s3a).
# Образ tabulario/spark-iceberg уже содержит iceberg-spark-runtime,
# hadoop-aws и aws SDK — отдельные --packages не нужны.

spark.sql.extensions                 org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# --- Каталог Iceberg "hive" поверх Hive Metastore ---------------------------
spark.sql.catalog.hive               org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.hive.type          hive
spark.sql.catalog.hive.uri           thrift://hive-metastore:9083
spark.sql.catalog.hive.warehouse     s3a://warehouse/
spark.sql.defaultCatalog             hive

# Лог событий для History Server (порт 18080)
spark.eventLog.enabled               true
spark.eventLog.dir                   /home/iceberg/spark-events
spark.history.fs.logDirectory        /home/iceberg/spark-events

# --- Доступ к MinIO по s3a (HadoopFileIO) -----------------------------------
spark.hadoop.fs.s3a.impl                     org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.endpoint                 http://minio:9000
spark.hadoop.fs.s3a.access.key               minioadmin
spark.hadoop.fs.s3a.secret.key               minioadmin
spark.hadoop.fs.s3a.path.style.access        true
spark.hadoop.fs.s3a.connection.ssl.enabled   false
spark.hadoop.fs.s3a.aws.credentials.provider org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
